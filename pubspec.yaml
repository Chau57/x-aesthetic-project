name: x_aesthetic_app
description: Mobile application skeleton for X-Aesthetic, an interactive photography assistant.
publish_to: "none"
version: 0.2.0+2

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.11.0+2
  path: ^1.9.1
  path_provider: ^2.1.5
  sensors_plus: ^6.1.1
  image: ^4.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/
    - assets/style_configs/
